# Cloudflare Workers configuration for Prisim R2 (OpenNext build output).
# See: https://opennext.js.org/cloudflare/get-started
#
# To bind a real D1 database, run:
#   wrangler d1 create prisim-r2-db
# then paste the returned database_id below.

name = "prisim-r2"
main = ".open-next/worker.js"
compatibility_date = "2026-05-20"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

# Disable esbuild's keep-names. Without this, libraries like next-themes that
# convert scripts to strings can emit an `__name(...)` reference into the
# stringified payload, and the browser hits `ReferenceError: __name is not
# defined` when it evaluates the script.
# Docs: https://opennext.js.org/cloudflare/howtos/keep_names (requires
# wrangler >= 4.13.0; we are on 4.93+).
keep_names = false

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# D1 database binding — routes read/write via env.DB.
# `database_id` must be replaced with the real UUID after `wrangler d1 create`.
[[d1_databases]]
binding = "DB"
database_name = "prisim-r2-db"
database_id = "ca97efd0-6267-4632-a35d-539433bff8b7"
migrations_dir = "drizzle/migrations"

# Workers Observability — surfaces console.log / errors / wall time in the
# Cloudflare dashboard. Free for the first 200k events/day. `audit_log` D1
# entries are still the durable record; this is only for runtime triage.
# Docs: https://developers.cloudflare.com/workers/observability/logs/workers-logs/
[observability]
enabled = true
