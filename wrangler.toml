# Cloudflare Pages configuration for Prisim R2.
# See: https://developers.cloudflare.com/pages/functions/wrangler-configuration/
#
# To bind a real D1 database, run:
#   wrangler d1 create prisim-r2-db
# then paste the returned database_id below.

name = "prisim-r2"
compatibility_date = "2026-05-20"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# D1 database binding — Subtask 3 reads/writes via env.DB.
# `database_id` must be replaced with the real UUID after `wrangler d1 create`.
[[d1_databases]]
binding = "DB"
database_name = "prisim-r2-db"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "drizzle/migrations"
